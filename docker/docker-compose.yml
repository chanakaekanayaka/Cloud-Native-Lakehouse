version: '3.8'

services:
  minio:
    image: minio/minio
    container_name: minio-s3
    ports:
      - "9000:9000"  # API port (For application and code connectivity)
      - "9001:9001"  # Console port (For web-based dashboard access)
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  minio_data: